<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ApexTC</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(15, 17, 21, 0.7), rgba(15, 17, 21, 0.7)), url('everest.jpeg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            animation: slowZoom 30s ease-in-out infinite alternate;
        }

        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f59e0b;
            font-size: 1.5rem;
            text-decoration: none;
            z-index: 100;
            transition: 0.3s;
        }
        .back-arrow:hover { color: #fff; transform: translateX(-5px); }

        @keyframes slowZoom {
            0% { background-size: 100% 100%; }
            100% { background-size: 110% 110%; }
        }
        
        .form-container {
            background: rgba(26, 29, 35, 0.85);
            padding: 50px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        @media (max-width: 480px) {
            .form-container { padding: 30px; }
        }

        h2 { margin-top: 0; color: #f59e0b; font-weight: 600; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 1rem; font-weight: 400; }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0f1115;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 5px rgba(245, 158, 11, 0.5);
        }

        .apex-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            color: #000;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }
        .apex-btn:hover { box-shadow: 0 0 30px rgba(245, 158, 11, 0.9); }
        .apex-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <a href="login.html" class="back-arrow"><i class="fas fa-arrow-left"></i></a>

    <div class="form-container">
        <h2>Reset Password</h2>
        <p>Enter your email address to receive recovery instructions.</p>

        <form id="reset-form">
            <input 
                type="email" 
                name="email" 
                placeholder="Email Address" 
                autocomplete="email" 
                aria-label="Email Address" 
                required
            >
            
            <button type="submit" class="apex-btn">SEND INSTRUCTIONS</button>
        </form>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();

        const form = document.getElementById('reset-form');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'SENDING...';

            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => {
                    alert('Password reset instructions sent!');
                    btn.innerText = 'SENT';
                }, (error) => {
                    alert('Failed to send. Please try again.');
                    btn.disabled = false;
                    btn.innerText = 'SEND INSTRUCTIONS';
                });
        });
    </script>
</body>
</html>
