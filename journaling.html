<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <title>Trading Journal | Performance Review</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            color: #FFFFFF; 
            width: 100%;
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            background: linear-gradient(rgba(11, 18, 32, 0.85), rgba(11, 18, 32, 0.85)), url('everest.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 25px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
        }
        
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .back-arrow { font-size: 72px; text-decoration: none; color: #f6ad55; font-weight: bold; line-height: 1; flex-shrink: 0; }
        
        h1, h2, h3 { color: #f6ad55; }
        .title-main { font-size: 2.5em; margin: 0; }
        .title-sub { font-size: 0.6em; color: #a0aec0; vertical-align: middle; }

        .journal-entry { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; margin-top: 20px; }
        textarea { width: 100%; height: 100px; background: transparent; border: 1px solid #4a5568; color: white; border-radius: 4px; padding: 10px; box-sizing: border-box; margin-top: 10px; resize: none; }
        button { background: #f6ad55; color: #0b1220; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        /* Floating Modal Styling */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a202c; padding: 30px; border-radius: 12px; border: 1px solid #f6ad55; z-index: 1000; text-align: center; }
        #modal button { margin-top: 15px; }

        @media (max-width: 600px) {
            .title-main { font-size: 1.5em; }
            .header-container { gap: 10px; }
            .back-arrow { font-size: 40px; }
            body { padding: 10px; }
            .glass { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="dashboard.html" class="back-arrow">&larr;</a>
        <div>
            <h1 class="title-main">Trading Journal <span class="title-sub">SELF-REFLECTION</span></h1>
        </div>
    </div>

    <div class="glass">
        <h3>Why Journaling Matters</h3>
        
        <p>A trading journal is the ultimate tool for professional growth. It forces you to document your decision-making process, helping you separate the result of a trade from the quality of the process itself.</p>

        <div class="journal-entry">
            <strong>Today's Review:</strong>
            <textarea id="journalText" placeholder="Record setup, execution quality, emotional state, and outcome..."></textarea>
            <button onclick="saveJournal()">Save Entry</button>
            <button onclick="toggleModal()">View Saved</button>
        </div>
    </div>

    <div id="modal">
        <h3>Saved Entry</h3>
        <p id="savedContent"></p>
        <button onclick="toggleModal()">Close</button>
    </div>

    <script>
        function saveJournal() {
            const text = document.getElementById('journalText').value;
            localStorage.setItem('tradingJournalEntry', text);
            alert('Entry saved locally.');
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            const saved = localStorage.getItem('tradingJournalEntry');
            document.getElementById('savedContent').innerText = saved || "No entries found.";
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = () => {
            const saved = localStorage.getItem('tradingJournalEntry');
            if (saved) document.getElementById('journalText').value = saved;
        };
    </script>
</body>
</html>
